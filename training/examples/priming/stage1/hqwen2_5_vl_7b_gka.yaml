### Stage 1: Distillation for HQwen2.5-VL-7B GKA ###
### Distill text backbone of HQwen2.5-VL-7B-GKA-Fused on long-context text. ###
### Vision encoder is frozen / not used; multimodal Stage 1 is a future ###
### improvement (would close the residual VL gap further). ###

### Model ###
# Stage 0 saves the hybrid text backbone separately to text_backbone/. Stage 1
# operates on that text backbone — simpler than running through the full VL
# wrapper since the vision tower isn't being trained.
model_name_or_path: ./models/HQwen2.5-VL-7B-GKA-Fused/text_backbone

### Distillation ###
stage: hkd
hybrid_lw_distill_target: none
hybrid_distill_pre_lm_head: true
hybrid_learnable_params: gka

### Dataset ###
dataset: pg19-sample
cutoff_len: 2048
preprocessing_num_workers: 32
dataloader_num_workers: 4
packing: true
template: qwen3_nothink_pt
preserve_tokenizer_config: true

### Training ###
do_train: true
finetuning_type: full
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
lr_scheduler_type: constant_with_warmup
warmup_steps: 720
max_grad_norm: 1.0
max_steps: 19000
seed: 42
sequence_parallel_size: 1

### Precision & Performance ###
pure_bf16: false
bf16: true
flash_attn: disabled
disable_gradient_checkpointing: false

### DeepSpeed ###
deepspeed: examples/deepspeed/ds_z3_offload_config.json
ddp_timeout: 180000000

### Output ###
output_dir: ./models/HQwen2.5-VL-7B-GKA-Fused/Stage1
logging_steps: 10
save_steps: 1000
overwrite_output_dir: false
save_only_model: true
report_to: none
